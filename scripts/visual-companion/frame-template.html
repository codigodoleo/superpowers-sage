<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Superpowers Sage Visual Companion</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #1a1f2b;
      --muted: #6d7485;
      --accent: #0c7d54;
      --border: #d7dce5;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      background: radial-gradient(circle at top right, #e9f5ef 0%, var(--bg) 45%);
      color: var(--text);
    }
    .shell {
      max-width: 980px;
      margin: 24px auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(14, 22, 37, 0.08);
    }
    .head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .title { font-size: 16px; font-weight: 700; }
    .status { font-size: 12px; color: var(--muted); }
    .content { padding: 18px; }
    .choices {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .choice {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
    }
    .choice:hover { border-color: var(--accent); }
    .choice.selected {
      border-color: var(--accent);
      background: #eef8f3;
    }
    .foot {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <div class="title">Superpowers Sage Visual Companion</div>
      <div class="status" id="vc-status">Ready</div>
    </div>
    <div class="content">
      <h2>Architecture checkpoint</h2>
      <p>Pick an option below, then return to terminal to continue approval flow.</p>
      <div class="choices">
        <button class="choice" data-section="approach" data-choice="A">Option A</button>
        <button class="choice" data-section="approach" data-choice="B">Option B</button>
        <button class="choice" data-section="approach" data-choice="needs-revision">Needs revision</button>
      </div>
    </div>
    <div class="foot">
      <span id="vc-info">No selection yet</span>
      <span>Events are stored in events.jsonl</span>
    </div>
  </div>
  <script src="/helper.js"></script>
</body>
</html>
